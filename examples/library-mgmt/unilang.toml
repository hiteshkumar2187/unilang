# Library Management System — UniLang Project Configuration

[project]
name = "library-mgmt"
version = "1.0.0"
description = "A ticket-based library management system with ML-powered book prediction engine"
unilang-version = "1.0"
default-syntax = "python"

# ─── Python Dependencies ────────────────────────────────────
# Resolved via pip into .unilang/python_env/
[dependencies.python]
numpy = ">=1.24"
pandas = ">=2.0"
scikit-learn = ">=1.3"
flask = ">=3.0"
flask-cors = ">=4.0"
joblib = ">=1.3"
faker = ">=22.0"

# ─── Java Dependencies ──────────────────────────────────────
# Resolved via Maven into .unilang/java_libs/
[dependencies.java]
"org.springframework.boot:spring-boot-starter-web" = "3.2.0"
"org.springframework.boot:spring-boot-starter-data-jpa" = "3.2.0"
"com.h2database:h2" = "2.2.224"
"com.google.code.gson:gson" = "2.10.1"
"org.apache.commons:commons-lang3" = "3.14.0"
"com.zaxxer:HikariCP" = "5.1.0"

# ─── UniLang Standard Library ───────────────────────────────
[dependencies.unilang]
unilang-bridge = "1.0"

[build]
target = "jvm"
optimization = "release"
threads = "auto"

[runtime]
jvm-args = ["-Xmx4g", "-Xms1g"]
python-version = ">=3.11"
java-version = ">=21"

[server]
host = "0.0.0.0"
port = 8080
cors-origins = ["http://localhost:3000", "http://localhost:5500"]
