name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ═══════════════════════════════════════════════════════════
  # Build UniLang CLI + LSP for all platforms
  # ═══════════════════════════════════════════════════════════
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: unilang-cli-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: unilang-cli-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: unilang-cli-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: unilang-cli-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI and LSP
        run: cargo build --release --target ${{ matrix.target }}

      # Ad-hoc code sign macOS binaries to prevent Gatekeeper "malware" warnings
      - name: Sign macOS binaries
        if: runner.os == 'macOS'
        run: |
          for bin in target/${{ matrix.target }}/release/unilang target/${{ matrix.target }}/release/unilang-lsp; do
            if [ -f "$bin" ]; then
              codesign --force --deep -s - "$bin"
              echo "Signed: $bin"
            fi
          done

      # Binary name is "unilang" (not "unilang-cli") per Cargo.toml [[bin]]
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/${{ matrix.artifact }}/bin
          cp target/${{ matrix.target }}/release/unilang dist/${{ matrix.artifact }}/bin/unilang || true
          cp target/${{ matrix.target }}/release/unilang-lsp dist/${{ matrix.artifact }}/bin/unilang-lsp || true
          cp README.md LICENSE dist/${{ matrix.artifact }}/ || true
          cd dist && tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact }}/bin
          Copy-Item -ErrorAction SilentlyContinue target/${{ matrix.target }}/release/unilang.exe dist/${{ matrix.artifact }}/bin/unilang.exe
          Copy-Item -ErrorAction SilentlyContinue target/${{ matrix.target }}/release/unilang-lsp.exe dist/${{ matrix.artifact }}/bin/unilang-lsp.exe
          Copy-Item -ErrorAction SilentlyContinue README.md dist/${{ matrix.artifact }}/
          Copy-Item -ErrorAction SilentlyContinue LICENSE dist/${{ matrix.artifact }}/
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  # ═══════════════════════════════════════════════════════════
  # Build VS Code Extension (.vsix)
  # ═══════════════════════════════════════════════════════════
  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build VSIX
        run: |
          cd tools/vscode-extension
          cp ../../LICENSE LICENSE
          npm install
          npx @vscode/vsce package \
            --baseContentUrl https://github.com/hiteshkumar2187/unilang/blob/main/tools/vscode-extension/ \
            --baseImagesUrl https://github.com/hiteshkumar2187/unilang/raw/main/tools/vscode-extension/
          mkdir -p ../../dist
          cp *.vsix ../../dist/unilang-vscode.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unilang-vscode
          path: dist/unilang-vscode.vsix

  # ═══════════════════════════════════════════════════════════
  # Build JetBrains Plugin (.zip)
  # Pinned to Gradle 8.5 for compatibility with intellij plugin
  # ═══════════════════════════════════════════════════════════
  build-jetbrains:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Plugin
        run: |
          cd tools/jetbrains-plugin
          gradle buildPlugin

      - name: Copy artifact
        run: |
          mkdir -p dist
          cp tools/jetbrains-plugin/build/distributions/*.zip dist/unilang-jetbrains.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unilang-jetbrains
          path: dist/unilang-jetbrains.zip

  # ═══════════════════════════════════════════════════════════
  # Build UniLang IDE (Electron)
  # Build on each platform separately for native modules
  # ═══════════════════════════════════════════════════════════
  build-ide-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        run: |
          cd tools/unilang-ide
          npm install
          npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
      - name: Ad-hoc sign the app
        run: |
          APP_PATH=$(find tools/unilang-ide/dist -name "*.app" -maxdepth 3 | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --force --deep -s - "$APP_PATH"
            echo "Signed: $APP_PATH"
          fi
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: unilang-ide-macos
          path: tools/unilang-ide/dist/*.dmg
          if-no-files-found: warn
      - name: Upload ZIP (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: unilang-ide-macos-zip
          path: tools/unilang-ide/dist/*.zip
          if-no-files-found: warn

  build-ide-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        run: |
          cd tools/unilang-ide
          npm install
          npm run build:linux
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: unilang-ide-linux
          path: tools/unilang-ide/dist/*.AppImage
          if-no-files-found: warn

  build-ide-win:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        shell: bash
        run: |
          cd tools/unilang-ide
          npm install
          npm run build:win
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: unilang-ide-windows
          path: tools/unilang-ide/dist/*.exe
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════
  # Create GitHub Release with all artifacts
  # ═══════════════════════════════════════════════════════════
  release:
    needs: [build-cli, build-vscode, build-jetbrains, build-ide-mac, build-ide-linux, build-ide-win]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
        continue-on-error: true

      - name: List artifacts
        run: find release-artifacts -type f 2>/dev/null | sort || echo "No artifacts found"

      - name: Delete existing release if any
        run: |
          TAG="${{ github.ref_name || format('v{0}', github.event.inputs.version) }}"
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "None" ] && [ "$RELEASE_ID" != "" ]; then
            echo "Deleting existing release $RELEASE_ID for tag $TAG"
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
          fi
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', github.event.inputs.version) }}
          name: UniLang ${{ github.ref_name || github.event.inputs.version }}
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
          body: |
            ## UniLang ${{ github.ref_name || github.event.inputs.version }}

            ### Downloads

            #### UniLang CLI (Compiler + Language Server)
            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `unilang-cli-macos-arm64.tar.gz` |
            | macOS (Intel) | `unilang-cli-macos-x86_64.tar.gz` |
            | Linux (x86_64) | `unilang-cli-linux-x86_64.tar.gz` |
            | Windows (x86_64) | `unilang-cli-windows-x86_64.zip` |

            #### IDE Plugins
            | IDE | Download | Install |
            |-----|----------|---------|
            | VS Code / Cursor | `unilang-vscode.vsix` | `code --install-extension unilang-vscode.vsix` |
            | IntelliJ / PyCharm | `unilang-jetbrains.zip` | Settings → Plugins → ⚙ → Install from Disk |

            #### UniLang IDE (Standalone)
            | Platform | Download |
            |----------|----------|
            | macOS | `.dmg` / `.zip` |
            | Windows | `.exe` installer |
            | Linux | `.AppImage` |

            ### Installation Guides
            - [CLI Installation](https://github.com/hiteshkumar2187/unilang/blob/main/docs/guides/INSTALLATION.md)
            - [VS Code Setup](https://github.com/hiteshkumar2187/unilang/blob/main/docs/guides/VSCODE_SETUP.md)
            - [IntelliJ/PyCharm Setup](https://github.com/hiteshkumar2187/unilang/blob/main/docs/guides/JETBRAINS_SETUP.md)
            - [Eclipse Setup](https://github.com/hiteshkumar2187/unilang/blob/main/docs/guides/ECLIPSE_SETUP.md)
            - [IDE Setup](https://github.com/hiteshkumar2187/unilang/blob/main/docs/guides/IDE_SETUP.md)
            - [Quick Start](https://github.com/hiteshkumar2187/unilang/blob/main/docs/guides/QUICKSTART.md)

          files: |
            release-artifacts/**/*
