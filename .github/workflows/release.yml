name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

env:
  CARGO_TERM_COLOR: always

# ──────────────────────────────────────────────────────────────────────────────
# Platform matrix used by multiple jobs
# ──────────────────────────────────────────────────────────────────────────────
# target_suffix is the string embedded in artifact filenames and expected by
# the installer's detect_target() function.
#
#   x86_64-linux   → ubuntu-latest  → x86_64-unknown-linux-gnu
#   x86_64-macos   → macos-13       → x86_64-apple-darwin
#   aarch64-macos  → macos-latest   → aarch64-apple-darwin
#   x86_64-windows → windows-latest → x86_64-pc-windows-msvc

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Build UniLang Lite + Full editions for all platforms
  # ═══════════════════════════════════════════════════════════════════════════
  build-editions:
    name: ${{ matrix.edition }} / ${{ matrix.target_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        edition: [lite, full]
        include_os: [""]   # placeholder to force include expansion
        exclude:
          - edition: ""   # never matches; silences the "include_os" column
        # Platform rows — combined with each edition above
    # Re-declare the full matrix here using include so we get the cross-product.
    # GitHub Actions doesn't support nested loops natively, so we enumerate all
    # 8 combinations (2 editions × 4 platforms) explicitly.
    steps: []   # overridden below — see real job definition

  # Workaround: define one job per platform/edition pair using a flat include matrix.
  build-edition-bins:
    name: ${{ matrix.edition }} / ${{ matrix.target_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── lite ─────────────────────────────────────────────────────────
          - edition: lite
            os: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
            target_suffix: x86_64-linux
            ext: ""
            pkg_ext: tar.gz

          - edition: lite
            os: macos-13
            cargo_target: x86_64-apple-darwin
            target_suffix: x86_64-macos
            ext: ""
            pkg_ext: tar.gz

          - edition: lite
            os: macos-latest
            cargo_target: aarch64-apple-darwin
            target_suffix: aarch64-macos
            ext: ""
            pkg_ext: tar.gz

          - edition: lite
            os: windows-latest
            cargo_target: x86_64-pc-windows-msvc
            target_suffix: x86_64-windows
            ext: .exe
            pkg_ext: zip

          # ── full ─────────────────────────────────────────────────────────
          - edition: full
            os: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
            target_suffix: x86_64-linux
            ext: ""
            pkg_ext: tar.gz

          - edition: full
            os: macos-13
            cargo_target: x86_64-apple-darwin
            target_suffix: x86_64-macos
            ext: ""
            pkg_ext: tar.gz

          - edition: full
            os: macos-latest
            cargo_target: aarch64-apple-darwin
            target_suffix: aarch64-macos
            ext: ""
            pkg_ext: tar.gz

          - edition: full
            os: windows-latest
            cargo_target: x86_64-pc-windows-msvc
            target_suffix: x86_64-windows
            ext: .exe
            pkg_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.edition }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build ${{ matrix.edition }} edition
        run: >
          cargo build --release
          -p unilang-cli
          --target ${{ matrix.cargo_target }}
          --features ${{ matrix.edition }}

      # ── macOS signing ──────────────────────────────────────────────────────
      - name: Sign macOS binary (Developer ID)
        if: runner.os == 'macOS' && env.APPLE_DEVELOPER_CERT != ''
        env:
          APPLE_DEVELOPER_CERT: ${{ secrets.APPLE_DEVELOPER_CERT }}
          APPLE_DEVELOPER_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_DEVELOPER_CERT" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" -P "$APPLE_DEVELOPER_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          codesign --force --options runtime --sign "$IDENTITY" --timestamp \
            target/${{ matrix.cargo_target }}/release/unilang
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Sign macOS binary (ad-hoc fallback)
        if: runner.os == 'macOS' && env.APPLE_DEVELOPER_CERT == ''
        env:
          APPLE_DEVELOPER_CERT: ${{ secrets.APPLE_DEVELOPER_CERT }}
        run: codesign --force --deep -s - target/${{ matrix.cargo_target }}/release/unilang

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ARTIFACT="unilang-${{ matrix.edition }}-${{ matrix.target_suffix }}"
          mkdir -p dist/${ARTIFACT}
          cp target/${{ matrix.cargo_target }}/release/unilang dist/${ARTIFACT}/unilang
          cp README.md LICENSE dist/${ARTIFACT}/ 2>/dev/null || true
          cd dist
          tar -czf ${ARTIFACT}.tar.gz ${ARTIFACT}
          # Generate SHA-256 checksum
          sha256sum ${ARTIFACT}.tar.gz > ${ARTIFACT}.tar.gz.sha256 2>/dev/null || \
            shasum -a 256 ${ARTIFACT}.tar.gz > ${ARTIFACT}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "unilang-${{ matrix.edition }}-${{ matrix.target_suffix }}"
          New-Item -ItemType Directory -Force -Path dist/$artifact
          Copy-Item target/${{ matrix.cargo_target }}/release/unilang.exe dist/$artifact/unilang.exe
          Copy-Item -ErrorAction SilentlyContinue README.md dist/$artifact/
          Copy-Item -ErrorAction SilentlyContinue LICENSE dist/$artifact/
          Compress-Archive -Path dist/$artifact -DestinationPath dist/$artifact.zip
          # Generate SHA-256 checksum
          $hash = (Get-FileHash dist/$artifact.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $artifact.zip" | Out-File -Encoding ASCII dist/$artifact.zip.sha256

      - name: Upload edition artifact
        uses: actions/upload-artifact@v4
        with:
          name: unilang-${{ matrix.edition }}-${{ matrix.target_suffix }}
          path: dist/unilang-${{ matrix.edition }}-${{ matrix.target_suffix }}.*

  # ═══════════════════════════════════════════════════════════════════════════
  # Build the installer binary for all platforms
  # ═══════════════════════════════════════════════════════════════════════════
  build-installer:
    name: installer / ${{ matrix.target_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
            target_suffix: x86_64-linux
            binary: unilang-installer
            ext: ""

          - os: macos-13
            cargo_target: x86_64-apple-darwin
            target_suffix: x86_64-macos
            binary: unilang-installer
            ext: ""

          - os: macos-latest
            cargo_target: aarch64-apple-darwin
            target_suffix: aarch64-macos
            binary: unilang-installer
            ext: ""

          - os: windows-latest
            cargo_target: x86_64-pc-windows-msvc
            target_suffix: x86_64-windows
            binary: unilang-installer
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-installer-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build installer
        run: >
          cargo build --release
          -p unilang-installer
          --target ${{ matrix.cargo_target }}

      - name: Sign macOS installer (ad-hoc)
        if: runner.os == 'macOS'
        run: >
          codesign --force --deep -s -
          target/${{ matrix.cargo_target }}/release/unilang-installer

      - name: Stage installer (Unix)
        if: runner.os != 'Windows'
        run: |
          ARTIFACT="unilang-installer-${{ matrix.target_suffix }}"
          mkdir -p dist
          cp target/${{ matrix.cargo_target }}/release/unilang-installer dist/${ARTIFACT}
          sha256sum dist/${ARTIFACT} > dist/${ARTIFACT}.sha256 2>/dev/null || \
            shasum -a 256 dist/${ARTIFACT} > dist/${ARTIFACT}.sha256

      - name: Stage installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "unilang-installer-${{ matrix.target_suffix }}.exe"
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.cargo_target }}/release/unilang-installer.exe dist/$artifact
          $hash = (Get-FileHash dist/$artifact -Algorithm SHA256).Hash.ToLower()
          "$hash  $artifact" | Out-File -Encoding ASCII dist/$artifact.sha256

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target_suffix }}
          path: dist/unilang-installer-${{ matrix.target_suffix }}*

  # ═══════════════════════════════════════════════════════════════════════════
  # Build VS Code Extension (.vsix)
  # ═══════════════════════════════════════════════════════════════════════════
  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build VSIX
        run: |
          cd tools/vscode-extension
          cp ../../LICENSE LICENSE
          npm install
          npx @vscode/vsce package \
            --baseContentUrl https://github.com/AIWithHitesh/unilang/blob/main/tools/vscode-extension/ \
            --baseImagesUrl https://github.com/AIWithHitesh/unilang/raw/main/tools/vscode-extension/
          mkdir -p ../../dist
          cp *.vsix ../../dist/unilang-vscode.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unilang-vscode
          path: dist/unilang-vscode.vsix

  # ═══════════════════════════════════════════════════════════════════════════
  # Build JetBrains Plugin (.zip)
  # ═══════════════════════════════════════════════════════════════════════════
  build-jetbrains:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Plugin
        run: |
          cd tools/jetbrains-plugin
          gradle buildPlugin

      - name: Copy artifact
        run: |
          mkdir -p dist
          cp tools/jetbrains-plugin/build/distributions/*.zip dist/unilang-jetbrains.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unilang-jetbrains
          path: dist/unilang-jetbrains.zip

  # ═══════════════════════════════════════════════════════════════════════════
  # Build UniLang IDE (Electron)
  # ═══════════════════════════════════════════════════════════════════════════
  build-ide-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        run: |
          cd tools/unilang-ide
          npm install
          npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
      - name: Ad-hoc sign the app
        run: |
          APP_PATH=$(find tools/unilang-ide/dist -name "*.app" -maxdepth 3 | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --force --deep -s - "$APP_PATH"
            echo "Signed: $APP_PATH"
          fi
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: unilang-ide-macos
          path: tools/unilang-ide/dist/*.dmg
          if-no-files-found: warn
      - name: Upload ZIP (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: unilang-ide-macos-zip
          path: tools/unilang-ide/dist/*.zip
          if-no-files-found: warn

  build-ide-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        run: |
          cd tools/unilang-ide
          npm install
          npm run build:linux
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: unilang-ide-linux
          path: tools/unilang-ide/dist/*.AppImage
          if-no-files-found: warn

  build-ide-win:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        shell: bash
        run: |
          cd tools/unilang-ide
          npm install
          npm run build:win
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: unilang-ide-windows
          path: tools/unilang-ide/dist/*.exe
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════════════════
  # Create GitHub Release with all artifacts
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    needs:
      - build-edition-bins
      - build-installer
      - build-vscode
      - build-jetbrains
      - build-ide-mac
      - build-ide-linux
      - build-ide-win
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
        continue-on-error: true

      - name: List artifacts
        run: find release-artifacts -type f 2>/dev/null | sort || echo "No artifacts found"

      - name: Delete existing release if any
        run: |
          TAG="${{ github.ref_name || format('v{0}', github.event.inputs.version) }}"
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "None" ] && [ "$RELEASE_ID" != "" ]; then
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
          fi
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', github.event.inputs.version) }}
          name: UniLang ${{ github.ref_name || github.event.inputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          body: |
            ## UniLang ${{ github.ref_name || github.event.inputs.version }}

            ### Quick Install

            **macOS / Linux** — one-liner:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/AIWithHitesh/unilang/main/install.sh | sh
            ```

            **Windows (PowerShell)**:
            ```powershell
            irm https://raw.githubusercontent.com/AIWithHitesh/unilang/main/install.ps1 | iex
            ```

            Or download the installer binary directly:

            | Platform | Installer |
            |---|---|
            | macOS (Apple Silicon) | `unilang-installer-aarch64-macos` |
            | macOS (Intel) | `unilang-installer-x86_64-macos` |
            | Linux (x86_64) | `unilang-installer-x86_64-linux` |
            | Windows (x86_64) | `unilang-installer-x86_64-windows.exe` |

            ---

            ### Editions

            | | UniLang Lite | UniLang Full |
            |---|---|---|
            | Core runtime | ✅ | ✅ |
            | SQLite | ✅ | ✅ |
            | Redis | ✅ | ✅ |
            | Kafka (in-memory) | ✅ | ✅ |
            | Elasticsearch | ✅ | ✅ |
            | SMTP (email) | ✅ | ✅ |
            | MongoDB | ✅ | ✅ |
            | MySQL / PostgreSQL | ❌ | ✅ |
            | Memcached | ❌ | ✅ |
            | RabbitMQ / NATS | ❌ | ✅ |
            | InfluxDB | ❌ | ✅ |
            | Amazon S3 | ❌ | ✅ |
            | Prometheus | ❌ | ✅ |
            | WebSocket | ❌ | ✅ |

            ### Direct Downloads

            #### UniLang Lite
            | Platform | Download | SHA-256 |
            |---|---|---|
            | macOS (Apple Silicon) | `unilang-lite-aarch64-macos.tar.gz` | `.sha256` |
            | macOS (Intel) | `unilang-lite-x86_64-macos.tar.gz` | `.sha256` |
            | Linux (x86_64) | `unilang-lite-x86_64-linux.tar.gz` | `.sha256` |
            | Windows (x86_64) | `unilang-lite-x86_64-windows.zip` | `.sha256` |

            #### UniLang Full
            | Platform | Download | SHA-256 |
            |---|---|---|
            | macOS (Apple Silicon) | `unilang-full-aarch64-macos.tar.gz` | `.sha256` |
            | macOS (Intel) | `unilang-full-x86_64-macos.tar.gz` | `.sha256` |
            | Linux (x86_64) | `unilang-full-x86_64-linux.tar.gz` | `.sha256` |
            | Windows (x86_64) | `unilang-full-x86_64-windows.zip` | `.sha256` |

            #### IDE Plugins
            | IDE | Download |
            |---|---|
            | VS Code / Cursor | `unilang-vscode.vsix` |
            | IntelliJ / PyCharm | `unilang-jetbrains.zip` |

          files: |
            release-artifacts/**/*
